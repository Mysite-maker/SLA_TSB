<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Summary Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Prompt:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', 'Prompt', sans-serif;
            background-color: #f0f4f8;
        }

        .report-container {
            width: 210mm;
            min-height: 297mm;
            padding: 15mm 20mm;
            margin: 20px auto;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            position: relative;
            border-top: 12px solid #06b6d4;
        }

        .stat-card-gradient {
            background: linear-gradient(135deg, #ffffff 0%, #f0fdfa 100%);
        }

        @media print {
            body { background: none; padding: 0; }
            .report-container { margin: 0; box-shadow: none; width: 100%; border-top: 12px solid #06b6d4; }
            .no-print { display: none; }
        }
    </style>
</head>

<body>

    <!-- UI Controls -->
    <div class="no-print max-w-[210mm] mx-auto mt-6 mb-4 flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
        <div class="flex gap-4 items-center">
            <input type="file" id="csv-upload" accept=".csv" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
        </div>
        <button onclick="exportPDF()" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-bold text-sm transition-all flex items-center gap-2 shadow-md shadow-blue-100">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
            Export PDF
        </button>
    </div>

    <!-- Main Report Document -->
    <div id="report-content" class="report-container">
        
        <!-- Header Section -->
        <div class="mb-10">
            <h1 class="text-3xl font-[800] text-blue-600 leading-tight mb-2">
                ITS executive summary (KPI&SLA)
            </h1>
            <div class="flex items-center justify-between border-t border-b border-slate-100 py-3 mt-4">
                <div class="flex gap-8">
                    <div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">Begin date</span>
                        <span id="start-date" class="text-sm font-bold text-slate-700">-</span>
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block">End date</span>
                        <span id="end-date" class="text-sm font-bold text-slate-700">-</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block text-right">Report date</span>
                    <span id="gen-time" class="text-xs font-bold text-slate-500">-</span>
                </div>
            </div>
        </div>

        <!-- Section 1: Status Performance Analysis -->
        <div class="mb-10">
            <h3 class="text-[11px] font-black text-blue-500 mb-6 uppercase tracking-[0.2em] flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                01. Status Performance Analysis
            </h3>
            
            <div class="grid grid-cols-3 gap-6">
                <!-- KPI 1 -->
                <div class="stat-card-gradient border border-blue-100 rounded-2xl p-6 relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">Total Tickets</div>
                        <div id="kpi-total" class="text-4xl font-[800] text-slate-800 tracking-tighter">0</div>
                    </div>
                    <svg class="absolute -right-2 -bottom-2 text-blue-50 opacity-50" width="80" height="80" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                </div>

                <!-- KPI 2 -->
                <div class="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl p-6 text-white shadow-lg shadow-emerald-100 relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="text-[10px] font-bold text-emerald-100 uppercase tracking-widest mb-1">SLA Compliance</div>
                        <div id="kpi-sla" class="text-4xl font-[800] tracking-tighter">0%</div>
                    </div>
                    <svg class="absolute -right-2 -bottom-2 text-white opacity-20" width="80" height="80" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                </div>

                <!-- KPI 3 -->
                <div class="bg-gradient-to-br from-orange-400 to-amber-500 rounded-2xl p-6 text-white shadow-lg shadow-orange-100 relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="text-[10px] font-bold text-orange-50 uppercase tracking-widest mb-1">KPI Benchmark</div>
                        <div id="kpi-kpi" class="text-4xl font-[800] tracking-tighter">100%</div>
                    </div>
                    <svg class="absolute -right-2 -bottom-2 text-white opacity-20" width="80" height="80" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                </div>
            </div>
        </div>

        <!-- Section 2: Distribution Insights -->
        <div class="grid grid-cols-12 gap-10 mb-10">
            <!-- Left: Category Distribution -->
            <div class="col-span-7">
                <h3 class="text-[11px] font-black text-blue-500 mb-6 uppercase tracking-[0.2em] flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                    02. Category Distribution
                </h3>
                
                <div class="space-y-5" id="category-distribution">
                    <!-- Dynamic Rows -->
                </div>
            </div>

            <!-- Right: Location Leaderboard -->
            <div class="col-span-5">
                <h3 class="text-[11px] font-black text-blue-500 mb-6 uppercase tracking-[0.2em] flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                    03. Top10 Locations
                </h3>
                
                <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="px-4 py-2 text-[10px] font-black text-slate-400 uppercase">Location</th>
                                <th class="px-4 py-2 text-[10px] font-black text-slate-400 uppercase text-right">Tickets</th>
                            </tr>
                        </thead>
                        <tbody id="location-table-body" class="divide-y divide-slate-50">
                            <!-- Rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

       

        <!-- Footer -->
        <div class="absolute bottom-10 left-20 right-20 flex justify-between items-center border-t border-slate-100 pt-6">
            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest italic flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                Internal Use Only
            </div>
            <div class="text-[10px] text-slate-300 font-bold uppercase tracking-widest">
                ITS monthly report &copy; 2026
            </div>
        </div>

    </div>

    <script>
        let allData = [];

        document.getElementById('csv-upload').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) {
                processData(ev.target.result);
            };
            reader.readAsText(file);
        });

        function processData(csvText) {
            const lines = csvText.split('\n');
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const row = lines[i].split(',').map(cell => cell.trim().replace(/"/g, ''));
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = row[index];
                });
                data.push(obj);
            }
            
            allData = data;
            renderReport();
        }
function renderReport() {
 						if (!allData.length) return;

            const total = allData.length;
            
            // กรองสถานะ OK และ Breach ให้ตรงกับตัวเลข 1905 และ 495
            const slaMetCount = allData.filter(d => {
                const status = (d['SLA Status'] || "").trim().toUpperCase();
                return status === 'OK';
            }).length;

            const slaBreachCount = allData.filter(d => {
                const status = (d['SLA Status'] || "").trim().toUpperCase();
                return status === 'BREACH';
            }).length;

            const slaMetPct = total > 0 ? Math.round((slaMetCount / total) * 100) : 0;

            document.getElementById('kpi-total').innerText = total.toLocaleString();
            
            // แสดงผล: Breach (495) / OK (1905) ตามลำดับที่ท่านต้องการ
            document.getElementById('kpi-sla').innerHTML = `
                <span class="text-red-500">${slaBreachCount.toLocaleString()}</span><span class="text-white mx-2">/</span><span class="text-green-400">${slaMetCount.toLocaleString()}</span>
            `;
            document.getElementById('kpi-kpi').innerText = slaMetPct + '%';
            document.getElementById('gen-time').innerText = new Date().toLocaleString('th-TH');

            const dates = allData.map(d => new Date(d['Opening Date'])).filter(d => !isNaN(d));
            if (dates.length) {
                document.getElementById('start-date').innerText = new Date(Math.min(...dates)).toLocaleDateString('th-TH');
                document.getElementById('end-date').innerText = new Date(Math.max(...dates)).toLocaleDateString('th-TH');
            }

            // Category Infographic
            const catMap = d3.rollup(allData, v => v.length, d => d.Category);
            const catData = Array.from(catMap, ([name, value]) => ({ name, value }))
                .sort((a, b) => b.value - a.value);

            const colors = ['#06b6d4', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444'];

document.getElementById('category-distribution').innerHTML = catData.map((c, i) => {
    const pct = Math.round((c.value / total) * 100);
    const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#f43f5e', '#f59e0b', '#10b981', '#06b6d4'];
    return `
        <div class="mb-3">
            <div class="flex justify-between items-center mb-1.5">
                <span class="text-[11px] font-bold text-slate-700 uppercase tracking-tight">
                    ${c.name || 'Other'} (${c.value.toLocaleString()})
                </span>
                <span class="text-xs font-black text-slate-900">${pct}%</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                <div class="h-full rounded-full shadow-sm" style="width: ${pct}%; background-color: ${colors[i % colors.length]}"></div>
            </div>
        </div>
    `;
            }).join('');
            // Location Leaderboard: Slice to 10 and alternating light blue rows
            const locMap = d3.rollup(allData, v => v.length, d => d.Location);
            const locData = Array.from(locMap, ([name, value]) => ({ name, value }))
                .sort((a, b) => b.value - a.value)
                .slice(0, 10); // <--- แสดง 10 อันดับ

            document.getElementById('location-table-body').innerHTML = locData.map((l, index) => {
                // เพิ่มสีพื้นหลังฟ้าอ่อนในแถวคี่ (หรือคู่ตามความสวยงาม)
                const rowBgClass = (index % 2 !== 0) ? 'bg-blue-50/60' : '';
                return `
                <tr class="${rowBgClass} transition-colors">
                    <td class="px-4 py-2.5 text-[11px] font-bold text-slate-600 uppercase tracking-tight">${l.name || 'Unknown'}</td>
                    <td class="px-4 py-2.5 text-xs font-black text-blue-800 text-right">${l.value}</td>
                </tr>
                `;
            }).join('');
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const report = document.getElementById('report-content');
            const canvas = await html2canvas(report, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
            pdf.save('Executive_Summary_DeepBlue.pdf');
        }

        window.onload = () => {
            document.getElementById('gen-time').innerText = new Date().toLocaleString('th-TH');
        };
    </script>
</body>

</html>
